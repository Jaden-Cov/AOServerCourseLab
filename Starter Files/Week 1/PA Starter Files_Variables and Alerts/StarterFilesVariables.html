<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  Author: Jaden Covington
  Date: 1/29/2026
  Purpose: This exercise demonstrates the use of variables and alerts by
           responding to user selections using radio buttons.
  -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Variables and Alerts</title>

  <link rel="stylesheet" href="styles.css">
  <script src="modernizr.custom.05819.js"></script>
</head>

<body>
  <header>
    <h1>Jaden Covington, Variables and Alerts</h1>
  </header>

  <article>
    <h2>Shipping Address</h2>

    <section>
      <h3>Choose an address</h3>

      <p>
        <input type="radio" name="address" id="home">
        <label for="home">
          <strong>Home</strong><br>
          100 Main St.<br>
          Sicilia, MA 02103
        </label>
      </p>

      <p>
        <input type="radio" name="address" id="work">
        <label for="work">
          <strong>Work</strong><br>
          123 Robin Ln.<br>
          Crab City, MA 02104
        </label>
      </p>
    </section>

    <section>
      <label>Street Address</label>
      <input type="text">

      <label>City</label>
      <input type="text">

      <label>State</label>
      <input type="text">

      <label>Zip</label>
      <input type="text">
    </section>
  </article>

  <script>
    // Create variables
    var homeMsg = "You selected the Home address";
    var workMsg = "You selected the Work address";

    // Display alerts when radio buttons are clicked
    document.getElementById("home").addEventListener("click", function () {
      alert(homeMsg);
    });

    document.getElementById("work").addEventListener("click", function () {
      alert(workMsg);
    });
  </script>
</body>
</html>
