<!DOCTYPE html>
<html lang="en">
<head>
<!--
Author: Jaden
Date: January 29, 2026
Purpose: This exercise practices using JavaScript to calculate a lunch order total
and display different alert messages based on the total amount selected by the user.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Updating Alerts</title>

<link rel="stylesheet" href="./styles.css">
</head>

<body>

<header>
<h1>Jaden, Updating Alerts</h1>
</header>

<section>
<h2>Lunch selections</h2>

<form id="lunchForm">
<input type="checkbox" value="8.00"> Fried chicken ($8.00)<br>
<input type="checkbox" value="9.00"> Fried halibut ($9.00)<br>
<input type="checkbox" value="8.00"> Hamburger ($8.00)<br>
<input type="checkbox" value="13.00"> Grilled salmon ($13.00)<br>
<input type="checkbox" value="6.00"> Side salad ($6.00)<br><br>

<button type="button" onclick="calculateTotal()">Submit</button>
</form>
</section>

<script>
function calculateTotal() {
  let checks = document.querySelectorAll('input[type="checkbox"]');
  let subtotal = 0;
  let selected = false;
  let taxRate = 0.07;

  for (let i = 0; i < checks.length; i++) {
    if (checks[i].checked) {
      subtotal += parseFloat(checks[i].value);
      selected = true;
    }
  }

  if (!selected) {
    alert("Please select at least one item.");
    return;
  }

  let tax = subtotal * taxRate;
  let total = subtotal + tax;

  if (total <= 20) {
    alert("Your order total is $" + total.toFixed(2));
  } else {
    let gratuity = total * 0.20;
    let finalTotal = total + gratuity;

    alert(
      "Your order total before gratuity is $" + total.toFixed(2) +
      ". A 20% Gratuity has been added to your final bill, bringing the total to $" +
      finalTotal.toFixed(2)
    );
  }
}
</script>


</body>
</html>
