<!DOCTYPE html>
<html>
   <head>
      <!--
         Author:  Jaden Covington
         Date:    02/11/2026
         Purpose: This exercise creates an automated slideshow using JavaScript.
                  It displays a series of ISS images and updates both the image
                  and caption on a timed interval using setInterval().
      -->
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1.0">
      <title>Automated Slideshow</title>
      <link rel="stylesheet" href="styles.css" />
   </head>

   <body>
      <header>
         <h1>Jaden Covington — Automated Slideshow</h1>
      </header>

      <main>
         <!-- Slideshow image -->
         <img id="slideshow-img" src="" alt="Slideshow image" />

         <!-- Caption text -->
         <p id="caption"></p>
      </main>

      <!-- Link the JavaScript file -->
      <script src="AutomatedSlideshow.js"></script>
   </body>
</html>
