<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  Author: Jaden Covington
  Date: 02/17/2026 
  Purpose:
  This exercise practices using JavaScript cookies to track whether a user has visited a webpage before.-->

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tracking Visits</title>

  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 24px; }
    h1 { margin-bottom: 10px; }
    p { font-size: 16px; }
  </style>
</head>

<body>
  <header>
    <h1>Jadcov6623, Tracking Visits</h1>
  </header>

  <main>
    <p id="message"></p>
  </main>

  <script>
    "use strict";

    // Get a cookie value by name (returns null if not found)
    function getCookie(name) {
      const cookies = document.cookie ? document.cookie.split("; ") : [];
      for (let i = 0; i < cookies.length; i++) {
        const parts = cookies[i].split("=");
        const cookieName = parts.shift();
        const cookieValue = parts.join("=");
        if (cookieName === name) {
          return decodeURIComponent(cookieValue);
        }
      }
      return null;
    }

    // Set a cookie (stores for 30 days so it persists)
    function setCookie(name, value, days) {
      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      const expires = "expires=" + d.toUTCString();
      document.cookie = name + "=" + encodeURIComponent(value) + "; " + expires + "; path=/";
    }

    function formatVisitDate(dateObj) {
      // Example: Wednesday 8/20/2025 at 23:40:12
      const day = dateObj.toLocaleDateString(undefined, { weekday: "long" });
      const date = dateObj.toLocaleDateString();
      const time = dateObj.toLocaleTimeString();
      return `${day} ${date} at ${time}`;
    }

    // Main logic on page load
    (function () {
      const msgEl = document.getElementById("message");

      // Read the previous visit from the cookie
      const lastVisit = getCookie("lastvisit");

      if (!lastVisit) {
        msgEl.textContent = "Welcome! This is your first visit to the webpage.";
      } else {
        // Convert stored string back into a Date
        const lastVisitDate = new Date(lastVisit);
        msgEl.textContent = "Your last visit was " + formatVisitDate(lastVisitDate) + ".";
      }

      // Save the current visit time for NEXT load/refresh
      const now = new Date();
      setCookie("lastvisit", now.toString(), 30);
    })();
  </script>
</body>
</html>
